name: Build & Deploy to EKS

# Dispara apenas em push para main.
# O antigo 03-build-image.yml também disparava aqui — foi fundido neste arquivo
# para evitar duplicidade de execução.
on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: fiap-fcg
  NAMESPACE: fiap-fcg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # AWS
      # ----------------------------------------------------------------
      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        # A action exporta automaticamente a variável steps.login-ecr.outputs.registry

      # ----------------------------------------------------------------
      # Build & Push — users-api
      # Este repositório É a UsersAPI, então o contexto é a raiz (.)
      # e o Dockerfile fica em ./src/FCG.WebApi/Dockerfile
      # ----------------------------------------------------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/FCG.WebApi/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/fiap-fcg/users-api:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/fiap-fcg/users-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # ----------------------------------------------------------------
      # Scan de segurança da imagem antes de implantar
      # ----------------------------------------------------------------
      - name: Scan da imagem (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/fiap-fcg/users-api:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      # ----------------------------------------------------------------
      # Assinatura da imagem com Cosign (keyless via OIDC)
      # ----------------------------------------------------------------
      - name: Instalar Cosign
        uses: sigstore/cosign-installer@v3

      - name: Assinar imagem
        run: |
          cosign sign --yes \
            ${{ steps.login-ecr.outputs.registry }}/fiap-fcg/users-api@${{ steps.build.outputs.digest }}

      # ----------------------------------------------------------------
      # Deploy no EKS
      # ----------------------------------------------------------------
      - name: Instalar kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Atualizar kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Rollout restart — users-api
        run: |
          kubectl rollout restart deployment/users-api -n ${{ env.NAMESPACE }}

      - name: Aguardar rollout
        run: |
          kubectl rollout status deployment/users-api \
            -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Exibir URL do Load Balancer
        run: |
          LB=$(kubectl get svc -n ingress-nginx ingress-nginx-controller \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "✅ Deploy concluído!"
          echo "   Health : http://${LB}/users/health"
          echo "   Swagger: http://${LB}/users/swagger/index.html"

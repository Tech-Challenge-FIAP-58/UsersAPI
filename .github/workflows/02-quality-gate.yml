name: Quality Gate

# Roda nos mesmos eventos do CI, em paralelo.
# workflow_run foi removido porque: (1) dependency-review-action exige pull_request,
# (2) workflow_run sempre executa na branch default, não na branch do PR.
on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Analisa vulnerabilidades no sistema de arquivos (dependências, configs).
      # Substitui o dependency-review-action, que só funciona em eventos pull_request.
      - name: Trivy — Scan de dependências (fs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
name: Quality Gate

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  quality:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run não expõe o SHA do PR diretamente; precisamos
          # fazer checkout do ref que disparou o CI
          ref: ${{ github.event.workflow_run.head_sha }}

      # dependency-review-action só funciona em pull_request.
      # Aqui usamos Trivy para análise de dependências no lugar.
      - name: Trivy — Scan de dependências (fs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
